<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐍 無限霓虹貪吃蛇</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🐍 無限霓虹貪吃蛇</h1>
        <div class="score">分數: <span id="score">0</span></div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div class="controls">
            <button onclick="startGame()">開始遊戲</button>
            <button onclick="togglePause()">暫停 / 繼續</button>
            <button onclick="showLeaderboard()">🏆 排行榜</button>
        </div>

        <div class="dpad">
            <button onclick="changeDirection(0, -1)" class="up">↑</button>
            <button onclick="changeDirection(-1, 0)" class="left">←</button>
            <button onclick="changeDirection(1, 0)" class="right">→</button>
            <button onclick="changeDirection(0, 1)" class="down">↓</button>
        </div>
    </div>

    <script src="snake.js"></script>
</body>
</html>
