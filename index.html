<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐍 無限霓虹貪吃蛇</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🐍 無限霓虹貪吃蛇</h1>

        <div class="score-container">
            <span class="score-label">⚡ 分數</span>
            <span class="score-value" id="score">0</span>
        </div>

        <div class="status-indicator">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">尚未開始</span>
        </div>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="640" height="480"></canvas>
        </div>

        <div class="controls">
            <button class="btn" onclick="startGame()">🎮 開始遊戲</button>
            <button class="btn" onclick="togglePause()">⏯️ 暫停/繼續</button>
            <button class="btn btn-leaderboard" onclick="showLeaderboard()">🏆 排行榜</button>
        </div>

        <div class="dpad">
            <button onclick="changeDirection(0, -1)" class="up">▲</button>
            <button onclick="changeDirection(-1, 0)" class="left">◀</button>
            <button onclick="changeDirection(1, 0)" class="right">▶</button>
            <button onclick="changeDirection(0, 1)" class="down">▼</button>
        </div>
    </div>

    <script src="snake.js"></script>
</body>
</html>
